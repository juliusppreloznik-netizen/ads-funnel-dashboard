<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funnel Builder</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        #original-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="original-frame" src="/funnel-builder-reference.html"></iframe>
    
    <script>
        // Wait for iframe to load
        const iframe = document.getElementById('original-frame');
        
        iframe.onload = function() {
            const iframeWindow = iframe.contentWindow;
            const iframeDocument = iframe.contentDocument;
            
            // Inject backend integration script
            const script = iframeDocument.createElement('script');
            script.textContent = `
                // Override the generateFunnel function to use backend
                (function() {
                    const originalGenerateFunnel = window.generateFunnel;
                    
                    window.generateFunnel = async function() {
                        const mechanism = document.getElementById('fgMechanism').value;
                        
                        if (!mechanism.trim()) {
                            showStatus('⚠️ Enter your Unique Mechanism name');
                            return;
                        }
                        
                        // Show progress
                        document.getElementById('fgForm').style.display = 'none';
                        document.getElementById('fgProgress').classList.add('active');
                        document.getElementById('fgOutput').classList.remove('active');
                        
                        // Send generation request to parent window
                        window.top.postMessage({
                            type: 'GENERATE_FUNNEL',
                            payload: {
                                mechanism,
                                colorScheme: window.fgSelectedColor,
                                pageType: window.fgSelectedPage
                            }
                        }, '*');
                    };
                    
                    // Listen for generation responses
                    window.addEventListener('message', function(event) {
                        if (event.data.type === 'GENERATION_COMPLETE') {
                            const { landingHtml, thankyouHtml } = event.data.payload;
                            
                            if (landingHtml) {
                                window.fgGeneratedCode.landing = landingHtml;
                                window.fgCurrentTab = 'landing';
                            }
                            if (thankyouHtml) {
                                window.fgGeneratedCode.thankyou = thankyouHtml;
                                window.fgCurrentTab = 'thankyou';
                            }
                            
                            document.getElementById('fgProgress').classList.remove('active');
                            document.getElementById('fgOutput').classList.add('active');
                            window.renderFgTabs();
                            window.showStatus('✓ Funnel generated!');
                        } else if (event.data.type === 'GENERATION_ERROR') {
                            document.getElementById('fgProgress').classList.remove('active');
                            document.getElementById('fgForm').style.display = 'block';
                            window.showStatus('❌ Generation failed');
                        } else if (event.data.type === 'TRIGGER_SAVE') {
                            // Handle save request
                            const name = prompt('Enter funnel name:', 'My Funnel');
                            if (name) {
                                window.top.postMessage({
                                    type: 'SAVE_FUNNEL',
                                    payload: {
                                        name,
                                        mechanism: document.getElementById('fgMechanism').value,
                                        colorScheme: window.fgSelectedColor,
                                        landingHtml: window.fgGeneratedCode.landing || '',
                                        thankyouHtml: window.fgGeneratedCode.thankyou || ''
                                    }
                                }, '*');
                            }
                        } else if (event.data.type === 'REQUEST_AUTOSAVE') {
                            // Send current state for autosave
                            window.top.postMessage({
                                type: 'AUTOSAVE_DATA',
                                payload: {
                                    landingHtml: window.fgGeneratedCode.landing || '',
                                    thankyouHtml: window.fgGeneratedCode.thankyou || ''
                                }
                            }, '*');
                        } else if (event.data.type === 'TRIGGER_UNDO') {
                            if (window.editor && window.editor.UndoManager) {
                                window.editor.UndoManager.undo();
                            }
                        } else if (event.data.type === 'TRIGGER_REDO') {
                            if (window.editor && window.editor.UndoManager) {
                                window.editor.UndoManager.redo();
                            }
                        } else if (event.data.type === 'AI_EDIT_COMPLETE') {
                            // Update the current page with AI-edited HTML
                            const { modifiedHtml } = event.data.payload;
                            if (window.fgCurrentTab === 'landing') {
                                window.fgGeneratedCode.landing = modifiedHtml;
                            } else if (window.fgCurrentTab === 'thankyou') {
                                window.fgGeneratedCode.thankyou = modifiedHtml;
                            }
                            window.renderFgTabs();
                            window.showStatus('✓ AI edit applied!');
                        } else if (event.data.type === 'AI_EDIT_ERROR') {
                            window.showStatus('❌ AI edit failed');
                        }
                    });
                    
                    // Hide API key input - try multiple selectors
                    setTimeout(() => {
                        const apiKeyInput = document.getElementById('fgApiKey');
                        if (apiKeyInput) {
                            const parent = apiKeyInput.closest('.fg-input-row') || apiKeyInput.parentElement;
                            if (parent) parent.style.display = 'none';
                        }
                        
                        // Also try finding by label text
                        const labels = document.querySelectorAll('label, .fg-label');
                        labels.forEach(label => {
                            if (label.textContent.includes('API KEY')) {
                                const parent = label.closest('.fg-input-row') || label.parentElement;
                                if (parent) parent.style.display = 'none';
                            }
                        });
                        
                        // Override AI Assistant to use backend
                        const originalGeneratePrompt = window.generatePrompt;
                        window.generatePrompt = async function(type) {
                            const funnelContent = window.getFunnelContent ? window.getFunnelContent() : '';
                            const customInput = document.getElementById('customPromptInput')?.value.trim();
                            
                            // For custom prompts, send to backend for execution
                            if (type === 'custom' && customInput) {
                                window.showStatus('⏳ AI is editing...');
                                window.top.postMessage({
                                    type: 'AI_EDIT_REQUEST',
                                    payload: {
                                        instruction: customInput,
                                        currentHtml: funnelContent,
                                        context: `Mechanism: ${document.getElementById('fgMechanism')?.value || 'N/A'}`
                                    }
                                }, '*');
                                return;
                            }
                            
                            // For preset buttons, show the prompt as before
                            if (originalGeneratePrompt) {
                                originalGeneratePrompt(type);
                            }
                        };
                        
                        // Add color picker
                        const colorSection = document.querySelector('.fg-color-grid');
                        if (colorSection) {
                            const colorPicker = document.createElement('input');
                            colorPicker.type = 'color';
                            colorPicker.id = 'customColorPicker';
                            colorPicker.style.cssText = 'width: 60px; height: 60px; border-radius: 12px; border: 3px solid #333; cursor: pointer; margin-left: 12px;';
                            colorPicker.value = '#3b82f6';
                            colorPicker.addEventListener('change', (e) => {
                                window.fgSelectedColor = 'custom';
                                window.FG_COLORS = window.FG_COLORS || {};
                                window.FG_COLORS.custom = {
                                    primary: e.target.value,
                                    secondary: e.target.value + '20',
                                    accent: e.target.value
                                };
                                // Update UI to show selection
                                document.querySelectorAll('.fg-color-box').forEach(box => box.classList.remove('selected'));
                            });
                            colorSection.appendChild(colorPicker);
                        }
                    }, 500);
                    
                })();
            `;
            iframeDocument.body.appendChild(script);
        };
        
        // Forward messages from iframe to parent
        window.addEventListener('message', function(event) {
            if (event.source === iframe.contentWindow) {
                window.parent.postMessage(event.data, '*');
            }
        });
        
        // Forward messages from parent to iframe
        window.addEventListener('message', function(event) {
            if (event.source === window.parent) {
                iframe.contentWindow.postMessage(event.data, '*');
            }
        });
    </script>
</body>
</html>
